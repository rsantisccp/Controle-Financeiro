<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0e1116" id="metaTheme">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Meu Bolso">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230e1116'/%3E%3Ctext x='90' y='124' font-size='96' text-anchor='middle' font-family='system-ui'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">
<title>Meu Bolso — Controle Financeiro</title>
<style>
/* =========================================================
   TEMA / TOKENS
   ========================================================= */
:root{
  --bg:#0e1116; --surface:#161b22; --surface-2:#1d2530; --line:#262e3a;
  --text:#e6edf3; --muted:#8b97a7; --muted-2:#5c6675;
  --brand:#2ee6a6; --brand-ink:#04130d; --brand-dim:#16523c;
  --income:#37d49a; --expense:#ff6b81; --warn:#f4b942; --info:#5aa7ff;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --radius:18px; --radius-sm:12px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html[data-theme="light"]{
  --bg:#f3f5f8; --surface:#ffffff; --surface-2:#eef1f6; --line:#e1e6ee;
  --text:#10151c; --muted:#5c6675; --muted-2:#9aa4b2;
  --brand:#0fb784; --brand-ink:#ffffff; --brand-dim:#bdeede;
  --income:#0a9d6e; --expense:#e23d54; --warn:#c98a08; --info:#2f72d6;
  --shadow:0 8px 24px rgba(20,30,50,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:16px}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}
h1,h2,h3{margin:0; font-weight:700; letter-spacing:-.01em}
.app{max-width:560px; margin:0 auto; min-height:100vh; position:relative}

/* =========================================================
   TOPO
   ========================================================= */
.topbar{
  position:sticky; top:0; z-index:30; background:linear-gradient(var(--bg),var(--bg) 70%,transparent);
  padding:14px 16px 8px; display:flex; align-items:center; gap:12px;
}
.topbar h1{font-size:20px}
.topbar .sub{color:var(--muted); font-size:12.5px; margin-top:1px}
.spacer{flex:1}
.monthnav{display:flex; align-items:center; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:3px}
.monthnav button{width:30px; height:30px; border-radius:999px; color:var(--muted); font-size:18px; display:grid; place-items:center}
.monthnav button:active{background:var(--surface-2)}
.monthnav .lbl{font-size:13px; font-weight:600; min-width:84px; text-align:center; text-transform:capitalize}

/* =========================================================
   ESTRUTURA / VIEWS
   ========================================================= */
.view{padding:4px 16px 120px; display:none}
.view.active{display:block; animation:fade .18s ease}
@keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
.section-title{font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin:22px 2px 10px; font-weight:700}

/* Cards */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px}
.card+.card{margin-top:12px}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}

/* Resumo do mês */
.balance .label{color:var(--muted); font-size:13px}
.balance .big{font-size:30px; font-weight:800; margin-top:2px; letter-spacing:-.02em}
.pills{display:flex; gap:10px; margin-top:14px}
.pill{flex:1; background:var(--surface-2); border-radius:var(--radius-sm); padding:10px 12px}
.pill .t{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px}
.pill .v{font-size:17px; font-weight:700; margin-top:3px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.up{color:var(--income)} .down{color:var(--expense)}
.bg-up{background:var(--income)} .bg-down{background:var(--expense)}

/* Cartão de crédito visual (assinatura do app) */
.cc{position:relative; border-radius:16px; padding:16px; color:#fff; overflow:hidden; min-height:120px; box-shadow:var(--shadow)}
.cc::after{content:""; position:absolute; inset:0; background:radial-gradient(120% 120% at 100% 0%,rgba(255,255,255,.18),transparent 55%)}
.cc .row{position:relative; z-index:1; display:flex; justify-content:space-between; align-items:flex-start}
.cc .name{font-weight:700; font-size:15px}
.cc .brand{font-size:11px; opacity:.85; text-transform:uppercase; letter-spacing:.12em}
.cc .chip{width:34px;height:24px;border-radius:5px;background:linear-gradient(135deg,#f5d061,#caa028); position:relative; z-index:1; margin-top:10px}
.cc .limitbar{position:relative; z-index:1; height:7px; border-radius:6px; background:rgba(255,255,255,.25); margin-top:14px; overflow:hidden}
.cc .limitbar > i{display:block; height:100%; border-radius:6px; background:#fff}
.cc .limitbar.warn > i{background:var(--warn)}
.cc .info{position:relative; z-index:1; display:flex; justify-content:space-between; font-size:12px; margin-top:8px; opacity:.95}

/* Listas */
.list{display:flex; flex-direction:column}
.item{display:flex; align-items:center; gap:12px; padding:12px 2px; border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex:none;color:#fff}
.item .meta{flex:1; min-width:0}
.item .meta .ttl{font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.item .meta .sub{color:var(--muted); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.item .amt{font-weight:700; font-size:15px; white-space:nowrap}
.muted{color:var(--muted)}
.empty{text-align:center; color:var(--muted); padding:34px 10px}
.empty .em{font-size:32px; display:block; margin-bottom:8px}

/* chips/tags */
.tag{font-size:11px; padding:2px 8px; border-radius:999px; background:var(--surface-2); color:var(--muted)}
.tag.warn{background:rgba(244,185,66,.16); color:var(--warn)}
.tag.bad{background:rgba(255,107,129,.16); color:var(--expense)}
.tag.ok{background:rgba(55,212,154,.16); color:var(--income)}

/* alertas */
.alert{display:flex; gap:11px; align-items:flex-start; padding:12px; border-radius:var(--radius-sm); background:var(--surface-2); border-left:3px solid var(--info)}
.alert.warn{border-color:var(--warn)} .alert.bad{border-color:var(--expense)}
.alert .em{font-size:18px; line-height:1.2}
.alert .tx{font-size:13.5px}
.alert .tx b{font-weight:700}

/* botões */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 16px; border-radius:12px; font-weight:700; font-size:15px; background:var(--surface-2); color:var(--text); width:100%}
.btn:active{transform:scale(.99)}
.btn.primary{background:var(--brand); color:var(--brand-ink)}
.btn.ghost{background:transparent; border:1px solid var(--line)}
.btn.danger{background:rgba(255,107,129,.15); color:var(--expense)}
.btn.sm{padding:9px 12px; font-size:13.5px; width:auto}
.btnrow{display:flex; gap:10px; margin-top:8px}

/* segmented */
.seg{display:flex; background:var(--surface-2); border-radius:12px; padding:4px; gap:4px}
.seg button{flex:1; padding:9px; border-radius:9px; font-weight:700; font-size:14px; color:var(--muted)}
.seg button.on{background:var(--surface); color:var(--text); box-shadow:var(--shadow)}
.seg button.on.income{color:var(--income)} .seg button.on.expense{color:var(--expense)}

/* =========================================================
   BOTTOM NAV + FAB
   ========================================================= */
.fab{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(20px + var(--safe-b)); z-index:40;
  width:60px;height:60px;border-radius:50%; background:var(--brand); color:var(--brand-ink);
  font-size:30px; display:grid; place-items:center; box-shadow:0 8px 22px rgba(46,230,166,.4)}
.fab:active{transform:translateX(-50%) scale(.94)}
.nav{position:fixed; left:0; right:0; bottom:0; z-index:35; background:color-mix(in srgb,var(--surface) 92%,transparent);
  backdrop-filter:blur(12px); border-top:1px solid var(--line);
  display:flex; padding:6px 6px calc(6px + var(--safe-b)); max-width:560px; margin:0 auto}
.nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 0; color:var(--muted); font-size:10.5px; font-weight:600}
.nav button .em{font-size:20px}
.nav button.on{color:var(--brand)}
.nav .gap{flex:1.1}

/* =========================================================
   MODAL / BOTTOM SHEET
   ========================================================= */
.scrim{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50; opacity:0; pointer-events:none; transition:opacity .2s}
.scrim.on{opacity:1; pointer-events:auto}
.sheet{position:fixed; left:0; right:0; bottom:0; z-index:51; background:var(--surface);
  border-radius:22px 22px 0 0; padding:8px 18px calc(18px + var(--safe-b)); max-width:560px; margin:0 auto;
  transform:translateY(102%); transition:transform .26s cubic-bezier(.2,.8,.2,1); max-height:92vh; overflow-y:auto}
.sheet.on{transform:none}
.sheet .grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 12px}
.sheet h2{font-size:18px; margin-bottom:14px}
.field{margin-bottom:13px}
.field label{display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; font-weight:600}
.field input,.field select,.field textarea{width:100%; background:var(--surface-2); border:1px solid var(--line);
  color:var(--text); border-radius:11px; padding:12px 13px; outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.field .row2{display:flex; gap:10px}
.amountbig{font-size:30px; font-weight:800; text-align:center; padding:14px; border:none; background:transparent; width:100%; color:var(--text)}
.amountbig:focus{outline:none}
.chips{display:flex; gap:8px; flex-wrap:wrap}
.chip-opt{padding:8px 12px; border-radius:11px; background:var(--surface-2); border:1px solid var(--line); font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:6px}
.chip-opt.on{border-color:var(--brand); background:color-mix(in srgb,var(--brand) 18%,var(--surface-2))}
.hint{font-size:11.5px; color:var(--muted); margin-top:4px}
.colorpick{display:flex; gap:8px; flex-wrap:wrap}
.colorpick span{width:30px;height:30px;border-radius:50%; border:2px solid transparent}
.colorpick span.on{border-color:var(--text)}

/* toast */
.toast{position:fixed; left:50%; bottom:calc(96px + var(--safe-b)); transform:translateX(-50%) translateY(20px);
  background:var(--text); color:var(--bg); padding:11px 18px; border-radius:999px; font-weight:600; font-size:14px;
  z-index:60; opacity:0; transition:.25s; pointer-events:none; white-space:nowrap; max-width:90%}
.toast.on{opacity:1; transform:translateX(-50%)}

/* charts */
.legend{display:flex; flex-direction:column; gap:8px; margin-top:12px}
.legend .lg{display:flex; align-items:center; gap:9px; font-size:13.5px}
.legend .lg .nm{flex:1; color:var(--muted)}
.legend .lg .vl{font-weight:700}
svg{display:block}

/* utilidades */
.flex{display:flex; align-items:center; gap:10px}
.between{display:flex; align-items:center; justify-content:space-between; gap:10px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
small.note{display:block; color:var(--muted); font-size:11.5px; line-height:1.5; margin-top:10px}
.swipe-hint{font-size:11px; color:var(--muted-2)}

/* atalhos rápidos (dashboard) */
.qarow{display:grid; grid-template-columns:repeat(4,1fr); gap:8px}
.qa{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 4px; display:flex; flex-direction:column; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--muted)}
.qa span{font-size:20px}
.qa:active{background:var(--surface-2)}

/* seleção de contas mensais a copiar */
.mcp-row{display:flex; align-items:center; gap:12px; padding:12px 2px; border-bottom:1px solid var(--line); cursor:pointer}
.mcp-row:last-child{border-bottom:none}
.mcp-row .meta{flex:1; min-width:0}
.mcp-row .ttl{font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mcp-row .sub{color:var(--muted); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mcp-row .amt{font-weight:700; font-size:14px; white-space:nowrap}
.mcp-chk{width:20px; height:20px; accent-color:var(--brand); flex:none}

/* fluxo de caixa diário */
.cf-day{margin-top:14px}
.cf-day .cf-head{display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin:0 2px 6px}
.cf-day .cf-date{font-weight:700; font-size:14px}
.cf-day .cf-date small{color:var(--muted); font-weight:600; margin-left:6px}
.cf-day .cf-bal{font-weight:700; font-size:14px}
.cf-ev{display:flex; align-items:center; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line)}
.cf-ev:last-child{border-bottom:none}
.cf-ev .meta{flex:1; min-width:0}
.cf-ev .ttl{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.cf-ev .sub{color:var(--muted); font-size:12px}
.cf-ev .amt{font-weight:700; font-size:14px; white-space:nowrap}
.cf-today{outline:2px solid var(--brand); outline-offset:2px; border-radius:12px}
.cf-neg{color:var(--expense)!important}

/* barras de progresso (orçamento / limite) */
.prog{height:9px; border-radius:6px; background:var(--surface-2); overflow:hidden}
.prog > i{display:block; height:100%; border-radius:6px; background:var(--brand); transition:width .3s}
.prog.warn > i{background:var(--warn)} .prog.bad > i{background:var(--expense)}
.kpi{display:flex; gap:10px}
.kpi .k{flex:1; background:var(--surface-2); border-radius:12px; padding:10px 12px}
.kpi .k .l{font-size:11.5px; color:var(--muted)} .kpi .k .n{font-size:16px; font-weight:700; margin-top:2px}

/* tabela comparativa */
.tbl{width:100%; border-collapse:collapse; font-size:13.5px}
.tbl th,.tbl td{padding:9px 6px; text-align:right; border-bottom:1px solid var(--line)}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl th{color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em}
.tbl tr:last-child td{border-bottom:none}

/* checklist (fechamento) */
.chk{display:flex; align-items:center; gap:12px; padding:11px 2px; border-bottom:1px solid var(--line)}
.chk:last-child{border-bottom:none}
.chk .box{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:15px;color:transparent;transition:.15s}
.chk.done .box{background:var(--brand);border-color:var(--brand);color:var(--brand-ink)}
.chk .meta{flex:1;min-width:0}
.chk .meta .ttl{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chk.done .meta .ttl{text-decoration:line-through;color:var(--muted)}
.chk .meta .sub{font-size:12px;color:var(--muted)}
.chk .amt{font-weight:700;font-size:14.5px;white-space:nowrap}
.budget-row{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.budget-row:last-child{border-bottom:none}
.budget-row input{width:104px;text-align:right;background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 9px}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <h1 id="topTitle">Início</h1>
      <div class="sub" id="topSub">Visão geral do mês</div>
    </div>
    <div class="spacer"></div>
    <div class="monthnav" id="monthNav">
      <button id="mPrev" aria-label="Mês anterior">‹</button>
      <span class="lbl num" id="mLbl">—</span>
      <button id="mNext" aria-label="Próximo mês">›</button>
    </div>
  </header>

  <!-- ===== DASHBOARD ===== -->
  <main class="view active" id="view-home"></main>
  <!-- ===== LANÇAR (input diário) ===== -->
  <main class="view" id="view-input"></main>
  <!-- ===== FLUXO DE CAIXA (diário) ===== -->
  <main class="view" id="view-cashflow"></main>
  <!-- ===== EXTRATO (todas as transações) ===== -->
  <main class="view" id="view-ledger"></main>
  <!-- ===== TRANSAÇÕES (mês) ===== -->
  <main class="view" id="view-tx"></main>
  <!-- ===== CARTÕES ===== -->
  <main class="view" id="view-cards"></main>
  <!-- ===== ORÇAMENTO ===== -->
  <main class="view" id="view-budget"></main>
  <!-- ===== FECHAMENTO (CHECKLIST) ===== -->
  <main class="view" id="view-closing"></main>
  <!-- ===== TERCEIROS ===== -->
  <main class="view" id="view-thirdparty"></main>
  <!-- ===== MAIS ===== -->
  <main class="view" id="view-more"></main>
</div>

<button class="fab" id="fab" aria-label="Novo lançamento">+</button>

<nav class="nav">
  <button data-tab="home" class="on"><span class="em">🏠</span>Início</button>
  <button data-tab="cashflow"><span class="em">📊</span>Fluxo</button>
  <span class="gap"></span>
  <button data-tab="ledger"><span class="em">📒</span>Extrato</button>
  <button data-tab="more"><span class="em">☰</span>Mais</button>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   MEU BOLSO — app de finanças pessoais (arquivo único, offline)
   Persistência: localStorage. Sem backend. Gráficos nativos (SVG).
   ============================================================ */

/* ---------------- utilidades de data ---------------- */
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function pad2(n){return String(n).padStart(2,'0');}
function ymOf(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1);}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function addMonthsYM(ym,n){let[y,m]=ym.split('-').map(Number);const t=(y*12+(m-1))+n;return Math.floor(t/12)+'-'+pad2((t%12)+1);}
function fmtDateBR(s){const d=parseDate(s);return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+d.getFullYear();}
// data/hora curta a partir de timestamp (ms) -> dd/mm/aa hh:mm
function fmtDateTimeBR(ms){if(!ms)return '—';const d=new Date(ms);return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2)+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());}
const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MESES_ABR=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function ymLabel(ym){const[y,m]=ym.split('-').map(Number);return MESES[m-1]+' '+y;}
function ymLabelShort(ym){const[y,m]=ym.split('-').map(Number);return MESES_ABR[m-1]+'/'+String(y).slice(2);}

/* ---------------- dinheiro ---------------- */
function fmtBRL(n){return 'R$ '+ (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtNum(n){return (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
// converte texto digitado (ex.: "1.234,56" ou "1234.56" ou "1234,5") em número
function parseMoney(str){
  if(typeof str==='number')return str;
  if(!str)return 0;
  let s=String(str).trim().replace(/[^\d.,-]/g,'');
  if(s.indexOf(',')>-1){ s=s.replace(/\./g,'').replace(',', '.'); } // formato BR
  const v=parseFloat(s); return isNaN(v)?0:v;
}

/* ============================================================
   LÓGICA FINANCEIRA (validada em testes Node — 22/22)
   ============================================================ */

// CONVENÇÃO (estilo Mobills): a fatura é identificada pelo MÊS DE FECHAMENTO.
// Compra no dia <= dia de fechamento entra na fatura que fecha NESTE mês;
// compra APÓS o fechamento entra na fatura do mês seguinte.
function invoiceMonthFor(dateStr, closingDay){
  const d=parseDate(dateStr); const day=d.getDate(); let ym=ymOf(d);
  if(day>closingDay) ym=addMonthsYM(ym,1);
  return ym;
}
// Vencimento: se diaVenc > diaFech, vence no mês do fechamento; senão, no mês seguinte.
function dueDateFor(invoiceYM, closingDay, dueDay){
  let ym=invoiceYM; if(dueDay<=closingDay) ym=addMonthsYM(ym,1);
  const[y,m]=ym.split('-').map(Number); const last=new Date(y,m,0).getDate();
  return new Date(y,m-1,Math.min(dueDay,last));
}
function dueISO(invoiceYM,closingDay,dueDay){const d=dueDateFor(invoiceYM,closingDay,dueDay);return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
// Divide valor em N parcelas (centavos), resto na 1ª.
function splitInstallments(total,n){
  const c=Math.round(total*100), base=Math.floor(c/n), rem=c-base*n, a=[];
  for(let i=0;i<n;i++)a.push((base+(i===0?rem:0))/100); return a;
}
// Limite usado = despesas no cartão - faturas pagas.
function cardUsed(cardId){
  const spent=state.txs.filter(t=>t.accountId===cardId&&t.kind==='expense').reduce((s,t)=>s+t.amount,0);
  const paid=state.invoicePayments.filter(p=>p.cardId===cardId).reduce((s,p)=>s+p.amount,0);
  return Math.max(0,spent-paid);
}
function invoiceTxs(cardId,ym){
  const card=getAccount(cardId);
  return state.txs.filter(t=>t.accountId===cardId&&t.kind==='expense')
    .filter(t=>(t.invoiceMonth||invoiceMonthFor(t.date,card.closingDay))===ym);
}
function invoiceTotal(cardId,ym){return invoiceTxs(cardId,ym).reduce((s,t)=>s+t.amount,0);}
function isInvoicePaid(cardId,ym){return state.invoicePayments.some(p=>p.cardId===cardId&&p.invoiceMonth===ym);}

function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){ state=JSON.parse(raw); }
    else { state=defaultState(); save(); }
  }catch(e){
    console.error('Falha ao ler dados',e);
    state=defaultState();
  }
  if(!state.ui) state.ui={month:ymOf(new Date())};
  if(!state.ui.monthlyDismissed) state.ui.monthlyDismissed=[];
  if(!state.settings) state.settings={theme:'dark'};
  if(state.settings.driveClientId===undefined) state.settings.driveClientId='';
  if(state.settings.driveAuto===undefined) state.settings.driveAuto=false;
  if(!state.meta) state.meta={lastInput:null,lastSync:null,updatedAt:Date.now()};
  if(state.meta.updatedAt===undefined) state.meta.updatedAt=Date.now();
  if(!state.budgets) state.budgets={}; // compatibilidade com backups antigos
  // Migração: empréstimos antigos sem parcelas materializadas -> gera despesas reais.
  try{
    for(const ln of (state.accounts||[]).filter(a=>a.type==='loan')){
      const hasTxs=state.txs.some(t=>t.loanId===ln.id);
      if(!hasTxs && ln.installments && ln.firstDate){
        syncLoanTxs(ln);
        // converte status "pago" antigo (paidInstallments) em settled
        const wasPaid=new Set(ln.paidInstallments||[]);
        for(const t of state.txs.filter(t=>t.loanId===ln.id)){ if(wasPaid.has(t.loanNo)) t.settled=true; }
      }
    }
  }catch(e){ console.error('Migração de empréstimos falhou',e); }
}
function save(autoSync=true){
  try{
    if(autoSync) state.meta.updatedAt=Date.now(); // marca alteração real (para sincronizar)
    localStorage.setItem(STORE_KEY,JSON.stringify(state));
  }
  catch(e){ toast('Não foi possível salvar (armazenamento cheio?)'); console.error(e); }
  if(autoSync) scheduleDrivePush(); // empurra p/ o Drive se conectado (debounce)
}

/* helpers de acesso */
function getAccount(id){return state.accounts.find(a=>a.id===id);}
function getCategory(id){return state.categories.find(c=>c.id===id);}
function cards(){return state.accounts.filter(a=>a.type==='card');}
function plainAccounts(){return state.accounts.filter(a=>a.type==='account');}
function loans(){return state.accounts.filter(a=>a.type==='loan');}

/* saldo de conta simples = saldo inicial + receitas - despesas lançadas nela
   + pagamentos de fatura debitados dela (saem da conta) */
function accountBalance(accId){
  const a=getAccount(accId); let b=a.openingBalance||0;
  for(const t of state.txs){ if(t.accountId===accId){ b+= t.kind==='income'? t.amount : -t.amount; } }
  for(const p of state.invoicePayments){ if(p.fromAccountId===accId) b-=p.amount; }
  return b;
}

/* ---------- DESPESAS: total x próprias x terceiros ----------
   Gastos de "terceiros" (cartão emprestado p/ família) entram na sua fatura,
   mas você será reembolsado — então separamos para não inflar SEU orçamento. */
function txsOfMonth(ym,kind){return state.txs.filter(t=>t.kind===kind&&ymOf(parseDate(t.date))===ym);}
function isThird(t){return !!(t.thirdParty&&String(t.thirdParty).trim());}
function expenseTotal(ym){return txsOfMonth(ym,'expense').reduce((s,t)=>s+t.amount,0);}        // tudo
function expenseOwn(ym){return txsOfMonth(ym,'expense').filter(t=>!isThird(t)).reduce((s,t)=>s+t.amount,0);} // só seus
function thirdTotal(ym){return txsOfMonth(ym,'expense').filter(isThird).reduce((s,t)=>s+t.amount,0);}
function thirdPending(ym){return txsOfMonth(ym,'expense').filter(t=>isThird(t)&&!t.reimbursed).reduce((s,t)=>s+t.amount,0);}
function thirdReceived(ym){return txsOfMonth(ym,'expense').filter(t=>isThird(t)&&t.reimbursed).reduce((s,t)=>s+t.amount,0);}

/* Receita "efetiva" do mês = receitas lançadas + reembolsos de terceiros já recebidos.
   Assim, o cartão emprestado entra UMA vez como despesa (na fatura) e, ao marcar
   "recebido" na aba Terceiros, o valor de volta é contado como entrada
   automaticamente — sem precisar relançar nada como receita. */
function incomeEffective(ym){return monthTotal(ym,'income')+thirdReceived(ym);}

/* agrupa gastos de terceiros por pessoa, no mês */
function thirdByPerson(ym){
  const m={};
  for(const t of txsOfMonth(ym,'expense')){ if(!isThird(t))continue;
    const k=t.thirdParty.trim();
    (m[k]||(m[k]={name:k,total:0,received:0,pending:0,items:[],allDone:true}));
    m[k].total+=t.amount; m[k].items.push(t);
    if(t.reimbursed)m[k].received+=t.amount; else {m[k].pending+=t.amount;m[k].allDone=false;}
  }
  return Object.values(m).sort((a,b)=>b.total-a.total);
}

/* ---------- LIMITES AGREGADOS DOS CARTÕES ---------- */
function cardsAggregate(){
  let limit=0,used=0; for(const c of cards()){limit+=c.limit||0;used+=cardUsed(c.id);}
  return {limit,used,available:Math.max(0,limit-used),pct:limit?Math.min(100,Math.round(used/limit*100)):0};
}

/* ---------- ORÇAMENTO (real x orçado) ----------
   Orçamento é por mês e por categoria. O "real" usado na comparação é o gasto
   PRÓPRIO (exclui terceiros), pois é o que você de fato planejou gastar. */
function getBudget(ym){return state.budgets[ym]||{};}
function budgetIncome(ym){return (getBudget(ym)._income)||0;}
function budgetTotalExpense(ym){const b=getBudget(ym);return Object.entries(b).filter(([k])=>k!=='_income').reduce((s,[,v])=>s+(+v||0),0);}
function realByCategory(ym){ // gasto próprio por categoria
  const m={}; for(const t of txsOfMonth(ym,'expense')){ if(isThird(t))continue; m[t.categoryId]=(m[t.categoryId]||0)+t.amount; } return m;
}
function setBudget(ym,catId,val){ if(!state.budgets[ym])state.budgets[ym]={}; if(val>0)state.budgets[ym][catId]=val; else delete state.budgets[ym][catId]; save(); }
function copyBudgetFrom(ym,fromYm){ const src=state.budgets[fromYm]; if(!src){toast('Mês de origem sem orçamento');return;} state.budgets[ym]=JSON.parse(JSON.stringify(src)); save(); toast('Orçamento copiado ✓'); renderAll(); }

/* ---------- CHECKLIST DE FECHAMENTO ----------
   Reúne tudo que entra/sai no mês com data prevista e status (recebi/paguei). */
function buildChecklist(ym){
  const items=[];
  // receitas (recebimentos previstos)
  for(const t of txsOfMonth(ym,'income')){
    const cat=getCategory(t.categoryId);
    items.push({id:'tx:'+t.id,dir:'in',date:t.date,title:t.description||(cat?cat.name:'Receita'),
      sub:(getAccount(t.accountId)?.name||''),amount:t.amount,done:!!t.settled,kind:'income-tx',ref:t.id,icon:cat?.icon||'💰',color:cat?.color||'#37d49a'});
  }
  // despesas que NÃO são de cartão (cartão é pago via fatura)
  for(const t of txsOfMonth(ym,'expense')){
    const acc=getAccount(t.accountId); if(acc&&acc.type==='card')continue;
    const cat=getCategory(t.categoryId);
    items.push({id:'tx:'+t.id,dir:'out',date:t.date,title:t.description||(cat?cat.name:'Despesa'),
      sub:(acc?.name||''),amount:t.amount,done:!!t.settled,kind:'expense-tx',ref:t.id,icon:cat?.icon||'💸',color:cat?.color||'#ff6b81'});
  }
  // faturas de cartão (uma linha por cartão com fatura aberta no mês)
  for(const c of cards()){
    const tot=invoiceTotal(c.id,ym); if(tot<=0)continue;
    items.push({id:'inv:'+c.id+':'+ym,dir:'out',date:dueISO(ym,c.closingDay,c.dueDay),
      title:'Fatura '+c.name,sub:'Cartão · vence '+fmtDateBR(dueISO(ym,c.closingDay,c.dueDay)),
      amount:tot,done:isInvoicePaid(c.id,ym),kind:'invoice',cardId:c.id,ym,icon:'💳',color:c.color||'#9b8cff'});
  }
  // parcelas de empréstimo: agora são despesas reais (kind 'expense' com loanId)
  // e já entram pelo laço de "despesas que NÃO são de cartão" acima.
  // reembolsos de terceiros (a receber)
  for(const p of thirdByPerson(ym)){
    items.push({id:'tp:'+ym+':'+p.name,dir:'in',date:ym+'-28',title:'Receber de '+p.name,
      sub:'Cartão emprestado · '+p.items.length+' lançamento(s)',amount:p.total,done:p.allDone,kind:'thirdparty',person:p.name,ym,icon:'👥',color:'#5aa7ff'});
  }
  items.sort((a,b)=>a.date.localeCompare(b.date));
  return items;
}
function toggleChecklist(item){
  if(item.kind==='income-tx'||item.kind==='expense-tx'){ const t=state.txs.find(x=>x.id===item.ref); if(t)t.settled=!t.settled; }
  else if(item.kind==='invoice'){ if(isInvoicePaid(item.cardId,item.ym)){ state.invoicePayments=state.invoicePayments.filter(p=>!(p.cardId===item.cardId&&p.invoiceMonth===item.ym)); } else { state.invoicePayments.push({id:uid(),cardId:item.cardId,invoiceMonth:item.ym,amount:invoiceTotal(item.cardId,item.ym),date:item.date,fromAccountId:null}); } }
  else if(item.kind==='loan'){ const ln=getAccount(item.loanId); ln.paidInstallments=ln.paidInstallments||[]; const i=ln.paidInstallments.indexOf(item.no); if(i>=0)ln.paidInstallments.splice(i,1); else ln.paidInstallments.push(item.no); }
  else if(item.kind==='thirdparty'){ const p=thirdByPerson(item.ym).find(x=>x.name===item.person); if(p){ const mark=!p.allDone; for(const t of p.items)t.reimbursed=mark; } }
  save(); renderAll();
}

/* ---- Contas mensais recorrentes: detecção e cópia do mês anterior ---- */
// Retorna as txs mensais do mês anterior cujo grupo ainda NÃO tem ocorrência no mês atual.
function pendingMonthlyToCopy(ym){
  const prev=addMonthsYM(ym,-1);
  const prevMonthly=state.txs.filter(t=>t.monthly && ymOf(parseDate(t.date))===prev);
  if(!prevMonthly.length) return [];
  const groupsThisMonth=new Set(
    state.txs.filter(t=>t.monthly && ymOf(parseDate(t.date))===ym).map(t=>t.monthlyGroup)
  );
  // dedup por grupo
  const seen=new Set(); const out=[];
  for(const t of prevMonthly){
    if(groupsThisMonth.has(t.monthlyGroup)) continue;     // já copiada
    if(seen.has(t.monthlyGroup)) continue;
    seen.add(t.monthlyGroup); out.push(t);
  }
  return out;
}
function copyMonthlyFromPrev(ym, groups){
  let pend=pendingMonthlyToCopy(ym);
  if(Array.isArray(groups)){ const set=new Set(groups); pend=pend.filter(t=>set.has(t.monthlyGroup)); }
  if(!pend.length){ toast('Nada a copiar'); return; }
  for(const src of pend){
    const acc=getAccount(src.accountId);
    const day=src.date.slice(8); const[y,m]=ym.split('-').map(Number);
    const last=new Date(y,m,0).getDate();
    const iso=ym+'-'+pad2(Math.min(+day||1,last));
    const t={id:uid(),kind:src.kind,amount:src.amount,accountId:src.accountId,
      categoryId:src.categoryId,date:iso,description:src.description,note:src.note,
      thirdParty:src.thirdParty||'', monthly:true, monthlyGroup:src.monthlyGroup,
      monthlyName:src.monthlyName||src.description};
    if(acc && acc.type==='card' && src.kind==='expense') t.invoiceMonth=invoiceMonthFor(iso,acc.closingDay);
    state.txs.push(t);
  }
  touchInput(); save(); toast(`${pend.length} conta(s) mensal(is) copiada(s) ✓`); closeSheet(); renderAll();
}
// Abre a planilha de seleção: o usuário escolhe QUAIS receitas/despesas mensais copiar.
function openMonthlyCopySheet(ym){
  const pend=pendingMonthlyToCopy(ym);
  if(!pend.length){ toast('Nada a copiar'); return; }
  const inc=pend.filter(t=>t.kind==='income');
  const exp=pend.filter(t=>t.kind==='expense');
  const rowHTML=t=>{
    const cat=getCategory(t.categoryId); const acc=getAccount(t.accountId);
    const sign=t.kind==='income'?'+':'−'; const cls=t.kind==='income'?'up':'down';
    const nome=escapeHTML(t.monthlyName||t.description||(cat?cat.name:'Conta'));
    return `<label class="mcp-row">
      <input type="checkbox" class="mcp-chk" data-g="${escapeHTML(t.monthlyGroup)}" checked>
      <div class="ic" style="background:${cat?cat.color:'#8b97a7'}">${cat?cat.icon:'•'}</div>
      <div class="meta"><div class="ttl">${nome}</div>
        <div class="sub">${acc?escapeHTML(acc.name):'—'}${cat?' · '+escapeHTML(cat.name):''}</div></div>
      <div class="amt ${cls} num">${sign} ${fmtNum(t.amount)}</div>
    </label>`;
  };
  let html=`<div class="grip"></div><h2>Copiar para ${ymLabel(ym)}</h2>
    <div class="hint" style="margin:-4px 2px 10px">Selecione o que deseja repetir neste mês. O que ficar desmarcado não será criado.</div>`;
  html+=`<div class="btnrow" style="margin-bottom:6px">
    <button class="btn ghost sm" style="flex:1" onclick="mcpToggleAll(true)">Marcar todas</button>
    <button class="btn ghost sm" style="flex:1" onclick="mcpToggleAll(false)">Desmarcar todas</button></div>`;
  if(exp.length){ html+=`<div class="section-title" style="margin-top:8px">Despesas mensais</div><div class="card"><div class="list mcp-list">`+exp.map(rowHTML).join('')+`</div></div>`; }
  if(inc.length){ html+=`<div class="section-title">Receitas mensais</div><div class="card"><div class="list mcp-list">`+inc.map(rowHTML).join('')+`</div></div>`; }
  html+=`<button class="btn primary mt8" onclick="confirmMonthlyCopy('${ym}')">Copiar selecionadas</button>`;
  html+=`<button class="btn ghost mt8" onclick="closeSheet()">Cancelar</button>`;
  openSheet(html);
}
function mcpToggleAll(v){ el('sheet').querySelectorAll('.mcp-chk').forEach(c=>c.checked=v); }
function confirmMonthlyCopy(ym){
  const groups=[...el('sheet').querySelectorAll('.mcp-chk')].filter(c=>c.checked).map(c=>c.dataset.g);
  if(!groups.length){ toast('Nenhuma selecionada'); return; }
  copyMonthlyFromPrev(ym, groups);
}
function dismissMonthlyCopy(ym){
  if(!state.ui.monthlyDismissed) state.ui.monthlyDismissed=[];
  if(!state.ui.monthlyDismissed.includes(ym)) state.ui.monthlyDismissed.push(ym);
  save(); renderAll();
}

function renderHome(){
  const ym=state.ui.month;
  const incomeM=incomeEffective(ym);
  const expenseM=expenseTotal(ym);
  const ownM=expenseOwn(ym);
  const thirdPend=thirdPending(ym);
  const thirdRec=thirdReceived(ym);
  const saldo=incomeM-expenseM;

  // faturas abertas (não pagas) e total
  let faturasTotal=0, faturasProx=[];
  for(const c of cards()){
    const tot=invoiceTotal(c.id,ym);
    if(tot>0 && !isInvoicePaid(c.id,ym)){
      faturasTotal+=tot;
      faturasProx.push({card:c,total:tot,due:dueISO(ym,c.closingDay,c.dueDay)});
    }
  }
  faturasProx.sort((a,b)=>a.due.localeCompare(b.due));

  const alerts=buildAlerts(ym);
  const byCat=groupExpenseByCategory(ym);
  const bySrc=groupExpenseBySource(ym);
  const hist=monthlyHistory(ym,6);
  const insights=buildInsights(ym,incomeM,expenseM,faturasTotal);
  const agg=cardsAggregate();
  const orcTotal=budgetTotalExpense(ym);
  const chk=buildChecklist(ym); const chkDone=chk.filter(i=>i.done).length;

  let html='';

  // ── Pergunta: copiar contas mensais do mês anterior? ──
  const monthlyPend = pendingMonthlyToCopy(ym);

function monthTotal(ym,kind){return state.txs.filter(t=>t.kind===kind&&ymOf(parseDate(t.date))===ym).reduce((s,t)=>s+t.amount,0);}
function groupExpenseByCategory(ym){
  const m={};
  for(const t of state.txs){ if(t.kind==='expense'&&ymOf(parseDate(t.date))===ym){ m[t.categoryId]=(m[t.categoryId]||0)+t.amount; } }
  return Object.entries(m).map(([id,value])=>{const c=getCategory(id)||{name:'?',color:'#8b97a7'};return{name:c.name,color:c.color,value};}).sort((a,b)=>b.value-a.value);
}
function groupExpenseBySource(ym){
  const m={};
  for(const t of state.txs){ if(t.kind==='expense'&&ymOf(parseDate(t.date))===ym){ m[t.accountId]=(m[t.accountId]||0)+t.amount; } }
  return Object.entries(m).map(([id,value])=>{const a=getAccount(id)||{name:'?',color:'#8b97a7'};return{name:a.name,color:a.color||'#8b97a7',icon:a.type==='card'?'💳':'🏦',value};}).sort((a,b)=>b.value-a.value);
}
function monthlyHistory(ym,n){
  const arr=[];
  for(let i=n-1;i>=0;i--){const k=addMonthsYM(ym,-i);arr.push({label:ymLabelShort(k),income:monthTotal(k,'income'),expense:monthTotal(k,'expense')});}
  return arr;
}
function daysUntil(iso){const a=parseDate(iso),b=parseDate(todayISO());return Math.round((a-b)/86400000);}

function buildAlerts(ym){
  const out=[];
  // faturas vencendo
  for(const c of cards()){
    const tot=invoiceTotal(c.id,ym);
    if(tot>0&&!isInvoicePaid(c.id,ym)){
      const due=dueISO(ym,c.closingDay,c.dueDay); const d=daysUntil(due);
      if(d<0) out.push({level:'bad',icon:'⏰',text:`Fatura do <b>${escapeHTML(c.name)}</b> está <b>vencida</b> (${fmtDateBR(due)}) — ${fmtBRL(tot)}.`});
      else if(d<=5) out.push({level:'warn',icon:'⏰',text:`Fatura do <b>${escapeHTML(c.name)}</b> vence em <b>${d} dia(s)</b> — ${fmtBRL(tot)}.`});
    }
    // limite
    const used=cardUsed(c.id); const pct=c.limit?used/c.limit:0;
    if(pct>0.8) out.push({level:pct>=1?'bad':'warn',icon:'💳',text:`Cartão <b>${escapeHTML(c.name)}</b> com <b>${Math.round(pct*100)}%</b> do limite usado (${fmtBRL(used)} de ${fmtBRL(c.limit)}).`});
  }
  // parcela de empréstimo a vencer
  for(const ln of loans()){
    const next=nextLoanInstallment(ln);
    if(next){const d=daysUntil(next.date); if(d>=0&&d<=7) out.push({level:'warn',icon:'🏦',text:`Parcela ${next.no}/${ln.installments} do empréstimo <b>${escapeHTML(ln.name)}</b> vence em <b>${d} dia(s)</b> — ${fmtBRL(ln.installmentValue)}.`});}
  }
  // despesas acima da média
  const hist=monthlyHistory(ym,6).slice(0,-1).map(h=>h.expense).filter(v=>v>0);
  if(hist.length>=2){const avg=hist.reduce((a,b)=>a+b,0)/hist.length; const cur=monthTotal(ym,'expense');
    if(cur>avg*1.2) out.push({level:'warn',icon:'📈',text:`Suas despesas este mês (${fmtBRL(cur)}) estão <b>${Math.round((cur/avg-1)*100)}% acima</b> da média recente.`});}
  return out;
}
function buildInsights(ym,income,expense,faturas){
  const out=[];
  // % em cartão
  const cardSpend=state.txs.filter(t=>t.kind==='expense'&&ymOf(parseDate(t.date))===ym&&getAccount(t.accountId)?.type==='card').reduce((s,t)=>s+t.amount,0);
  if(expense>0) out.push({icon:'💳',color:'#5aa7ff',text:`<b>${Math.round(cardSpend/expense*100)}%</b> dos seus gastos do mês foram no cartão de crédito.`});
  // comparação mês anterior
  const prev=monthTotal(addMonthsYM(ym,-1),'expense');
  if(prev>0){const diff=expense-prev; const p=Math.round(Math.abs(diff)/prev*100);
    out.push({icon:diff>0?'🔺':'🔻',color:diff>0?'#ff6b81':'#37d49a',text:`Gastou <b>${p}% ${diff>0?'a mais':'a menos'}</b> que no mês anterior (${fmtBRL(prev)}).`});}
  // categoria que mais cresceu
  const curCat=Object.fromEntries(groupExpenseByCategory(ym).map(c=>[c.name,c.value]));
  const prevCat=Object.fromEntries(groupExpenseByCategory(addMonthsYM(ym,-1)).map(c=>[c.name,c.value]));
  let grew=null;
  for(const[name,v]of Object.entries(curCat)){const pv=prevCat[name]||0; const inc=v-pv; if(inc>0&&(!grew||inc>grew.inc)) grew={name,inc};}
  if(grew&&grew.inc>0) out.push({icon:'⚠️',color:'#f4b942',text:`A categoria que mais cresceu foi <b>${escapeHTML(grew.name)}</b> (+${fmtBRL(grew.inc)}).`});
  // taxa de poupança
  if(income>0){const tx=Math.round((income-expense)/income*100); out.push({icon:tx>=0?'🌱':'🩹',color:tx>=0?'#37d49a':'#ff6b81',text:tx>=0?`Você guardou <b>${tx}%</b> da sua renda este mês.`:`Você gastou <b>${Math.abs(tx)}% além</b> da sua renda este mês.`});}
  // real x orçado
  const orc=budgetTotalExpense(ym);
  if(orc>0){const own=expenseOwn(ym); const p=Math.round(own/orc*100);
    out.push({icon:own>orc?'🚨':'🎯',color:own>orc?'#ff6b81':'#2ee6a6',text:own>orc?`Você <b>estourou o orçamento</b> em ${fmtBRL(own-orc)} (${p}% do previsto).`:`Você usou <b>${p}%</b> do orçamento do mês — restam ${fmtBRL(orc-own)}.`});}
  return out;
}

/* SVG donut */
function donutSVG(data){
  const total=data.reduce((s,d)=>s+d.value,0)||1; const R=52,sw=22,C=2*Math.PI*R; let off=0;
  let arcs='';
  data.forEach(d=>{const frac=d.value/total; const len=frac*C;
    arcs+=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
    off+=len;});
  return `<svg viewBox="0 0 140 140" width="140" height="140" style="margin:0 auto 4px">
    ${arcs}<text x="70" y="66" text-anchor="middle" fill="var(--muted)" font-size="11">Total</text>
    <text x="70" y="84" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">${fmtBRL(total).replace('R$ ','R$')}</text></svg>`;
}
/* SVG barras agrupadas (histórico) */
function barsSVG(hist){
  const W=320,H=150,pad=24,bw=W/hist.length, max=Math.max(1,...hist.flatMap(h=>[h.income,h.expense]));
  let bars='',labels='';
  hist.forEach((h,i)=>{const x=i*bw+bw/2; const w=10;
    const ih=(h.income/max)*(H-pad*2), eh=(h.expense/max)*(H-pad*2);
    bars+=`<rect x="${x-w-1}" y="${H-pad-ih}" width="${w}" height="${ih}" rx="2" fill="var(--income)"/>`;
    bars+=`<rect x="${x+1}" y="${H-pad-eh}" width="${w}" height="${eh}" rx="2" fill="var(--expense)"/>`;
    labels+=`<text x="${x}" y="${H-7}" text-anchor="middle" fill="var(--muted)" font-size="10">${h.label}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">${bars}${labels}</svg>`;
}

          <div class="limitbar ${pct>80?'warn':''}"><i style="width:${pct}%"></i></div>
          <div class="info"><span>Usado ${fmtBRL(used)} (${pct}%)</span><span>Disponível ${fmtBRL(avail)}</span></div>
        </div></div>`;
    }
  }
  // parcelamentos em aberto (futuros)
  const future=futureInstallments();
  if(future.length){
    html+=`<div class="section-title">Parcelamentos futuros</div><div class="card"><div class="list">`;
    for(const g of future.slice(0,12)){
      html+=`<div class="item"><div class="ic" style="background:${g.color}">🧾</div>
        <div class="meta"><div class="ttl">${escapeHTML(g.desc)} <span class="tag">${g.remaining}x restantes</span></div>
        <div class="sub">${escapeHTML(g.cardName)} · próxima ${ymLabelShort(g.nextYM)}</div></div>
        <div class="amt num">${fmtNum(g.value)}</div></div>`;
    }
    html+=`</div></div>`;
  }
  el('view-cards').innerHTML=html;
  el('view-cards').querySelectorAll('[data-open]').forEach(n=>n.onclick=()=>openCardInvoice(n.dataset.open,state.ui.month));
}
function futureInstallments(){
  const groups={}; const curYM=ymOf(new Date());
  for(const t of state.txs){
    if(t.installmentTotal>1 && t.installmentGroup){
      const acc=getAccount(t.accountId); if(!acc||acc.type!=='card')continue;
      const ym=t.invoiceMonth||invoiceMonthFor(t.date,acc.closingDay);
      const g=groups[t.installmentGroup]||(groups[t.installmentGroup]={desc:(t.description||'Compra').replace(/\s*\(\d+\/\d+\)$/,''),value:t.amount,cardName:acc.name,color:acc.color,remaining:0,nextYM:null});
      if(ym>=curYM){g.remaining++; if(!g.nextYM||ym<g.nextYM)g.nextYM=ym;}
    }
  }
  return Object.values(groups).filter(g=>g.remaining>0&&g.nextYM).sort((a,b)=>a.nextYM.localeCompare(b.nextYM));
}

/* abre a fatura de um cartão num bottom sheet, com navegação de meses */
function openCardInvoice(cardId,ym){

    <div class="between"><h2>${escapeHTML(c.name)}</h2>
      <div class="monthnav"><button onclick="openCardInvoice('${cardId}','${addMonthsYM(ym,-1)}')">‹</button>

    html+=`<button class="btn danger mt12" onclick="undoPay('${p.id}','${cardId}','${ym}')">Desfazer pagamento</button>`;

function nextLoanInstallment(ln){
  // Próxima parcela em aberto, derivada das despesas reais geradas para o empréstimo.
  const lt=state.txs.filter(t=>t.loanId===ln.id && !t.settled).sort((a,b)=>(a.loanNo||0)-(b.loanNo||0));
  if(lt.length) return {no:lt[0].loanNo, date:lt[0].date};
  return null;
}
/* ---- Empréstimos: parcelas viram DESPESAS REAIS (uma por mês) ---- */
// Garante a categoria padrão de empréstimos (cria só uma vez).
function ensureLoanCategory(){
  let c=state.categories.find(x=>x.type==='expense' && x.name==='Empréstimos/Financiamentos');
  if(!c){ c={id:uid(),name:'Empréstimos/Financiamentos',type:'expense',icon:'🏦',color:'#9b8cff'}; state.categories.push(c); }
  return c.id;
}
// Cria/atualiza/remove as txs de parcela para refletir os dados atuais do empréstimo.
// Preserva o status "pago" (settled) de cada parcela pelo número (loanNo).
function syncLoanTxs(ln){
  const catId=ensureLoanCategory();
  const baseDay=parseDate(ln.firstDate).getDate();
  const existing=new Map(state.txs.filter(t=>t.loanId===ln.id).map(t=>[t.loanNo,t]));
  for(let i=1;i<=ln.installments;i++){
    const ym=addMonthsYM(ln.firstDate.slice(0,7),i-1);
    const[y,m]=ym.split('-').map(Number); const last=new Date(y,m,0).getDate();
    const iso=ym+'-'+pad2(Math.min(baseDay,last));
    const ex=existing.get(i);
    const desc='Parcela '+i+'/'+ln.installments+' · '+ln.name;
    if(ex){
      ex.amount=ln.installmentValue; ex.date=iso; ex.accountId=ln.debitAccountId||null;
      ex.categoryId=catId; ex.description=desc; ex.loanInstallments=ln.installments;
      existing.delete(i);
    }else{
      state.txs.push({id:uid(),kind:'expense',amount:ln.installmentValue,accountId:ln.debitAccountId||null,
        categoryId:catId,date:iso,description:desc,note:'',thirdParty:'',
        loanId:ln.id,loanNo:i,loanInstallments:ln.installments,settled:false});
    }
  }
  // remove parcelas excedentes (caso o nº de parcelas tenha diminuído)
  for(const[,ex] of existing){ state.txs=state.txs.filter(t=>t.id!==ex.id); }
}

    el('monthlyHint').style.display= v==='monthly'?'block':'none';
    el('singleHint').style.display = v==='single'?'block':'none';
  };
  setTimeout(()=>el('txAmt')&&el('txAmt').focus(),250);
}
function saveTx(editId){
  const amount=parseMoney(el('txAmt').value);
  if(amount<=0){toast('Informe um valor');return;}
  const accountId=el('txAcc').value; if(!accountId){toast('Selecione conta ou cartão');return;}
  const categoryId=sheetState.cat||(state.categories.filter(c=>c.type===sheetState.kind)[0]||{}).id;
  const date=el('txDate').value||todayISO();
  const description=el('txDesc').value.trim();
  const kind=sheetState.kind;
  const acc=getAccount(accountId);
  const note = el('txObs') ? el('txObs').value.trim() : '';
  // gasto de terceiro (cartão emprestado)
  const thirdParty = (kind==='expense' && el('txThirdOn') && el('txThirdOn').checked) ? (el('txThird').value.trim()||'Terceiro') : '';

  if(editId){
    const t=state.txs.find(x=>x.id===editId);
    Object.assign(t,{amount,accountId,categoryId,date,description,kind,thirdParty,note});
    if(!thirdParty) delete t.reimbursed;
    if(acc.type==='card'&&kind==='expense') t.invoiceMonth=invoiceMonthFor(date,acc.closingDay); else delete t.invoiceMonth;
    touchInput(); save(); toast('Lançamento atualizado'); closeSheet(); renderAll(); return;
  }

  const mode = el('txMode') ? el('txMode').value : 'single';
  const inst = Math.max(2, parseInt(el('txInst')?.value||'2',10)||2);

  if(mode==='installments' && inst>1){
    // PARCELADA: divide o total em N parcelas, uma por mês/fatura
    const parts=splitInstallments(amount,inst);
    const group=uid();
    const baseInv = (acc.type==='card') ? invoiceMonthFor(date,acc.closingDay) : date.slice(0,7);
    const day=date.slice(8);
    parts.forEach((val,i)=>{
      const t={id:uid(),kind,amount:val,accountId,categoryId,date,thirdParty,note,
        description:(description||(getCategory(categoryId)?.name||'Compra'))+` (${i+1}/${inst})`,
        installmentNo:i+1,installmentTotal:inst,installmentGroup:group};
      if(acc.type==='card'){
        t.invoiceMonth=addMonthsYM(baseInv,i);
      } else {
        // conta comum: distribui a data nos meses seguintes
        const d=addMonthsYM(date.slice(0,7),i); const[y,m]=d.split('-').map(Number);
        const last=new Date(y,m,0).getDate(); t.date=d+'-'+pad2(Math.min(+day,last));
      }
      state.txs.push(t);
    });
    toast(`Compra parcelada em ${inst}x ✓`);
  } else if(mode==='monthly'){
    // MENSAL RECORRENTE: cria só a deste mês; a cópia é oferecida ao abrir o próximo mês
    const group=uid();
    const t={id:uid(),kind,amount,accountId,categoryId,date,description,note,thirdParty,
      monthly:true, monthlyGroup:group, monthlyName:(description||getCategory(categoryId)?.name||'Conta mensal')};
    if(acc.type==='card'&&kind==='expense') t.invoiceMonth=invoiceMonthFor(date,acc.closingDay);
    state.txs.push(t);
    toast('Conta mensal criada ✓ (será oferecida nos próximos meses)');
  } else {
    // ÚNICA
    const t={id:uid(),kind,amount,accountId,categoryId,date,description,thirdParty,note};
    if(acc.type==='card'&&kind==='expense') t.invoiceMonth=invoiceMonthFor(date,acc.closingDay);
    state.txs.push(t);
    toast(kind==='income'?'Receita adicionada ✓':'Despesa adicionada ✓');
  }
  touchInput(); save(); closeSheet(); renderAll();
}
function deleteTx(id){
  const t=state.txs.find(x=>x.id===id);
  const grp=t&&(t.installmentGroup||t.recurringGroup);
  if(grp){
    if(confirm('Este lançamento faz parte de um grupo (parcelas/fixos). Excluir TODOS do grupo? (Cancelar = excluir só este)')){
      state.txs=state.txs.filter(x=>x.installmentGroup!==grp&&x.recurringGroup!==grp);
    } else { state.txs=state.txs.filter(x=>x.id!==id); }
  } else { state.txs=state.txs.filter(x=>x.id!==id); }
  touchInput(); save(); toast('Excluído'); closeSheet(); renderAll();
}

function renderClosing(){

  const pendPag=items.filter(i=>i.dir==='out'&&!i.done).reduce((s,i)=>s+i.amount,0);
  const done=items.filter(i=>i.done).length; const pct=items.length?Math.round(done/items.length*100):0;

    </div></div>`;

    el('view-closing').innerHTML=html+`<div class="card empty"><span class="em">✅</span>Nenhum item previsto neste mês.<br><span class="swipe-hint">Lance receitas, despesas e faturas para vê-las aqui.</span></div>`;
    return;
  }
  html+=`<div class="section-title">A receber</div><div class="card"><div class="list">`;
  const ins=items.filter(i=>i.dir==='in'); const outs=items.filter(i=>i.dir==='out');
  html+= ins.length? ins.map(chkRow).join('') : `<div class="empty" style="padding:14px">Nada a receber.</div>`;
  html+=`</div></div><div class="section-title">A pagar</div><div class="card"><div class="list">`;

  el('view-closing').innerHTML=html;
  el('view-closing').querySelectorAll('[data-chk]').forEach(n=>n.onclick=()=>{
    const it=items.find(x=>x.id===n.dataset.chk); if(it)toggleChecklist(it);
  });

function chkRow(i){
  const sign=i.dir==='in'?'+':'−'; const cls=i.dir==='in'?'up':'down';
  const d=daysUntil(i.date); const late=!i.done&&d<0;
  return `<div class="chk ${i.done?'done':''}" data-chk="${i.id}">
    <div class="box">✓</div>

function importData(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const data=JSON.parse(r.result);
    if(!data||!Array.isArray(data.txs)||!Array.isArray(data.accounts))throw new Error('formato');
    if(!confirm('Importar substituirá TODOS os dados atuais. Continuar?'))return;
    state=data; if(!state.ui)state.ui={month:ymOf(new Date())}; if(!state.settings)state.settings={theme:'dark'};
    if(!state.meta)state.meta={lastInput:null,lastSync:null,updatedAt:Date.now()};
    save();renderAll();toast('Dados importados ✓');
  }catch(e){toast('Arquivo inválido');}};
  r.readAsText(f); ev.target.value='';
}

// escurece/clareia uma cor hex para o gradiente do cartão
function shade(hex,amt){try{let c=hex.replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');
  let n=parseInt(c,16),r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}catch(e){return hex;}}

/* ============================================================
   FLUXO DE CAIXA DIÁRIO (projeção)
   Mostra, dia a dia, entradas e saídas previstas e o SALDO PROJETADO
   ao fim de cada dia — para você ver se haverá dinheiro p/ pagar uma conta.
   ============================================================ */
// Saldo em caixa (contas comuns) carregado para ANTES do 1º dia do mês.
function cashCarriedBefore(firstISO){
  let b=0;
  for(const a of plainAccounts()){
    b += a.openingBalance||0;
    for(const t of state.txs){ if(t.accountId===a.id && t.date < firstISO){ b += t.kind==='income'? t.amount : -t.amount; } }
  }
  for(const p of state.invoicePayments){ const acc=getAccount(p.fromAccountId); if(acc && acc.type==='account' && p.date && p.date < firstISO) b-=p.amount; }
  return b;
}
// Eventos de caixa do mês: receitas, despesas que não são de cartão (inclui
// parcelas de empréstimo) e o pagamento das faturas no respectivo vencimento.
function cashEvents(ym){
  const ev=[];
  for(const t of txsOfMonth(ym,'income')){
    const cat=getCategory(t.categoryId);
    ev.push({date:t.date, dir:'in', amount:t.amount, title:t.description||(cat?cat.name:'Receita'),
      sub:(getAccount(t.accountId)?.name||''), icon:cat?.icon||'💰', settled:!!t.settled});
  }
  for(const t of txsOfMonth(ym,'expense')){
    const acc=getAccount(t.accountId); if(acc && acc.type==='card') continue; // cartão sai via fatura
    const cat=getCategory(t.categoryId);
    ev.push({date:t.date, dir:'out', amount:t.amount, title:t.description||(cat?cat.name:'Despesa'),
      sub:(acc?acc.name:'—'), icon:t.loanId?'🏦':(cat?.icon||'💸'), settled:!!t.settled});
  }
  // faturas de cartão cujo VENCIMENTO cai neste mês
  for(const c of cards()){
    for(const off of [-2,-1,0]){ // fatura pode fechar em meses anteriores e vencer agora
      const invYM=addMonthsYM(ym,off);
      const tot=invoiceTotal(c.id,invYM); if(tot<=0) continue;
      const due=dueISO(invYM,c.closingDay,c.dueDay);
      if(ymOf(parseDate(due))!==ym) continue;
      ev.push({date:due, dir:'out', amount:tot, title:'Fatura '+c.name,
        sub:'Cartão · '+ymLabelShort(invYM), icon:'💳', settled:isInvoicePaid(c.id,invYM)});
    }
  }
  ev.sort((a,b)=>a.date.localeCompare(b.date));
  return ev;
}
function renderCashflow(){
  const ym=state.ui.month;
  const[y,m]=ym.split('-').map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const firstISO=ym+'-01';
  const start=cashCarriedBefore(firstISO);
  const ev=cashEvents(ym);
  const totalIn=ev.filter(e=>e.dir==='in').reduce((s,e)=>s+e.amount,0);
  const totalOut=ev.filter(e=>e.dir==='out').reduce((s,e)=>s+e.amount,0);
  const endBal=start+totalIn-totalOut;
  // menor saldo do mês (ponto de aperto)
  let run=start, minBal=start, minDate=firstISO;
  const byDay={};
  for(const e of ev){ (byDay[e.date]=byDay[e.date]||[]).push(e); }
  for(let d=1; d<=lastDay; d++){
    const iso=ym+'-'+pad2(d);
    for(const e of (byDay[iso]||[])){ run += e.dir==='in'? e.amount : -e.amount; }
    if(run<minBal){ minBal=run; minDate=iso; }
  }

  let html='';
  if(!plainAccounts().length){
    html+=`<div class="card empty" style="padding:22px"><span class="em">📊</span>
      Cadastre ao menos uma <b>conta</b> (carteira/banco) para projetar o fluxo de caixa.
      <div class="btnrow" style="justify-content:center;margin-top:10px"><button class="btn ghost sm" onclick="openAccountSheet('account')">+ Nova conta</button></div></div>`;
    el('view-cashflow').innerHTML=html; return;
  }

  // Resumo do mês
  html+=`<div class="card balance">
    <div class="label">Saldo projetado ao fim de ${ymLabel(ym)}</div>
    <div class="big num ${endBal>=0?'up':'down'}">${endBal<0?'−':''}${fmtBRL(Math.abs(endBal))}</div>
    <div class="pills">
      <div class="pill"><div class="t">Saldo inicial</div><div class="v num ${start>=0?'up':'down'}">${fmtBRL(start)}</div></div>
      <div class="pill"><div class="t"><span class="dot bg-up"></span>Entradas</div><div class="v up num">${fmtBRL(totalIn)}</div></div>
      <div class="pill"><div class="t"><span class="dot bg-down"></span>Saídas</div><div class="v down num">${fmtBRL(totalOut)}</div></div>
    </div>
    ${minBal<0?`<small class="note" style="color:var(--expense)">⚠️ O saldo fica <b>negativo</b> (${fmtBRL(minBal)}) por volta de <b>${fmtDateBR(minDate)}</b>. Pode faltar dinheiro para as contas dessa data.</small>`
      :`<small class="note">Menor saldo do mês: <b>${fmtBRL(minBal)}</b> em ${fmtDateBR(minDate)}.</small>`}
  </div>`;

  html+=`<div class="hint" style="margin:14px 2px 4px">Projeção considerando contas (carteira/banco), parcelas de empréstimo e o vencimento das faturas. Compras no cartão entram apenas na data da fatura.</div>`;

  if(!ev.length){
    html+=`<div class="card empty" style="padding:22px"><span class="em">🗓️</span>Sem movimentações previstas neste mês.</div>`;
    el('view-cashflow').innerHTML=html; return;
  }

  // Dia a dia (somente dias com eventos)
  const todayIso=todayISO();
  run=start;
  for(let d=1; d<=lastDay; d++){
    const iso=ym+'-'+pad2(d);
    const list=byDay[iso]||[];
    if(!list.length) continue;
    for(const e of list){ run += e.dir==='in'? e.amount : -e.amount; }
    const dayIn=list.filter(e=>e.dir==='in').reduce((s,e)=>s+e.amount,0);
    const dayOut=list.filter(e=>e.dir==='out').reduce((s,e)=>s+e.amount,0);
    const wd=['dom','seg','ter','qua','qui','sex','sáb'][parseDate(iso).getDay()];
    html+=`<div class="card cf-day ${iso===todayIso?'cf-today':''}">
      <div class="cf-head">
        <div class="cf-date">${pad2(d)}/${pad2(m)} <small>${wd}${dayIn?' · +'+fmtNum(dayIn):''}${dayOut?' · −'+fmtNum(dayOut):''}</small></div>
        <div class="cf-bal ${run<0?'cf-neg':(run>=0?'up':'down')}">${run<0?'−':''}${fmtBRL(Math.abs(run))}</div>
      </div>`;
    for(const e of list){
      const sign=e.dir==='in'?'+':'−'; const cls=e.dir==='in'?'up':'down';
      html+=`<div class="cf-ev">
        <div class="ic" style="background:var(--surface-2)">${e.icon}</div>
        <div class="meta"><div class="ttl">${escapeHTML(e.title)} ${e.settled?'<span class="tag ok">pago</span>':''}</div>
          <div class="sub">${escapeHTML(e.sub||'')}</div></div>
        <div class="amt ${cls} num">${sign} ${fmtNum(e.amount)}</div>
      </div>`;
    }
    html+=`</div>`;
  }
  el('view-cashflow').innerHTML=html;
}

/* ============================================================
   GOOGLE DRIVE — sincronização (backup "na nuvem")
   Usa Google Identity Services (OAuth token) + Drive REST API.
   Escopo drive.file: o app só enxerga o arquivo que ele próprio cria
   (meubolso-dados.json), preservando a privacidade do resto do Drive.
   ============================================================ */
const DRIVE={ FILE_NAME:'meubolso-dados.json', SCOPE:'https://www.googleapis.com/auth/drive.file',
  token:null, tokenExp:0, fileId:null, busy:false };
let _pushTimer=null;
function driveClientId(){ return (state&&state.settings&&state.settings.driveClientId||'').trim(); }
function driveConnected(){ return !!(DRIVE.token && Date.now()<DRIVE.tokenExp); }
function gisReady(){ return !!(window.google&&google.accounts&&google.accounts.oauth2); }

function driveRequestToken(interactive=true){
  return new Promise((resolve,reject)=>{
    if(!gisReady()){ reject(new Error('Biblioteca do Google ainda não carregou. Verifique sua conexão e tente de novo.')); return; }
    if(!driveClientId()){ reject(new Error('Configure o Client ID do Google primeiro (aba Mais).')); return; }
    let done=false;
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:driveClientId(), scope:DRIVE.SCOPE,
      callback:(resp)=>{ done=true;
        if(resp&&resp.error){ reject(new Error(resp.error)); return; }
        DRIVE.token=resp.access_token;
        DRIVE.tokenExp=Date.now()+((resp.expires_in?resp.expires_in:3600)*1000)-120000;
        resolve(DRIVE.token);
      },
      error_callback:(err)=>{ done=true; reject(new Error((err&&err.type)||'Falha na autorização')); }
    });
    try{ tc.requestAccessToken({prompt: interactive?'':'none'}); }
    catch(e){ reject(e); }
    // se silencioso e nada respondeu (sem sessão), rejeita em 8s
    if(!interactive) setTimeout(()=>{ if(!done) reject(new Error('silent-timeout')); },8000);
  });
}
async function driveEnsureToken(interactive){ if(driveConnected()) return DRIVE.token; return await driveRequestToken(interactive); }

async function driveFindFile(){
  const tok=await driveEnsureToken(true);
  const q=encodeURIComponent("name='"+DRIVE.FILE_NAME+"' and trashed=false");
  const r=await fetch('https://www.googleapis.com/drive/v3/files?spaces=drive&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc&q='+q,
    {headers:{Authorization:'Bearer '+tok}});
  if(!r.ok) throw new Error('Erro ao listar arquivos ('+r.status+')');
  const j=await r.json();
  if(j.files&&j.files.length){ DRIVE.fileId=j.files[0].id; return j.files[0]; }
  DRIVE.fileId=null; return null;
}
async function drivePush(){
  const tok=await driveEnsureToken(true);
  if(!DRIVE.fileId) await driveFindFile();
  const body=JSON.stringify(state);
  if(DRIVE.fileId){
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+DRIVE.fileId+'?uploadType=media',
      {method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body});
    if(!r.ok) throw new Error('Erro ao atualizar no Drive ('+r.status+')');
  } else {
    const boundary='mb'+Math.random().toString(36).slice(2);
    const meta={name:DRIVE.FILE_NAME,mimeType:'application/json',description:'Backup do app Meu Bolso'};
    const multipart='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)
      +'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+boundary+'--';
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      {method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'multipart/related; boundary='+boundary},body:multipart});
    if(!r.ok) throw new Error('Erro ao criar no Drive ('+r.status+')');
    const j=await r.json(); DRIVE.fileId=j.id;
  }
  state.meta.lastSync=Date.now(); save(false); // não re-disparar push
}
async function drivePull(){
  const tok=await driveEnsureToken(true);
  if(!DRIVE.fileId){ const f=await driveFindFile(); if(!f) return null; }
  const r=await fetch('https://www.googleapis.com/drive/v3/files/'+DRIVE.fileId+'?alt=media',{headers:{Authorization:'Bearer '+tok}});
  if(!r.ok) throw new Error('Erro ao baixar do Drive ('+r.status+')');
  return await r.json();
}
function driveValidRemote(d){ return d&&typeof d==='object'&&Array.isArray(d.txs)&&Array.isArray(d.accounts)&&Array.isArray(d.categories); }
function driveApplyRemote(d){
  if(!driveValidRemote(d)) throw new Error('Arquivo do Drive inválido');
  state=d;
  if(!state.ui) state.ui={month:ymOf(new Date())};
  if(!state.settings) state.settings={theme:'dark',driveClientId:'',driveAuto:false};
  if(!state.meta) state.meta={lastInput:null,lastSync:null,updatedAt:Date.now()};
  if(!state.budgets) state.budgets={};
  state.meta.lastSync=Date.now();
  save(false);
}
function scheduleDrivePush(){
  if(!driveConnected()) return;            // só auto-empurra se já conectado nesta sessão
  if(!state.settings.driveAuto) return;    // respeita o toggle
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>{ drivePush().then(()=>{ if(activeTab==='home') renderHome(); }).catch(e=>console.warn('auto-push',e)); }, 3500);
}

// botão "Conectar / Sincronizar" (home e Mais)
async function driveManualSync(){
  if(DRIVE.busy) return;
  if(!driveClientId()){ toast('Configure o Client ID na aba Mais'); switchTab('more'); return; }
  DRIVE.busy=true; toast('Conectando ao Google...');
  try{
    await driveEnsureToken(true);
    const remote=await drivePull();
    if(remote && driveValidRemote(remote)){
      const lu=(state.meta&&state.meta.updatedAt)||0, ru=(remote.meta&&remote.meta.updatedAt)||0;
      if(ru>lu){ driveApplyRemote(remote); toast('Dados atualizados do Drive ✓'); }
      else { await drivePush(); toast('Backup enviado ao Drive ✓'); }
    } else {
      await drivePush(); toast('Backup criado no Drive ✓');
    }
  }catch(e){ console.error(e); toast('Falha: '+e.message); }
  finally{ DRIVE.busy=false; renderAll(); }
}
async function drivePushNow(){ // forçar envio
  if(!driveClientId()){toast('Configure o Client ID');return;}
  try{ await drivePush(); toast('Enviado ao Drive ✓'); renderAll(); }catch(e){toast('Falha: '+e.message);}
}
async function drivePullNow(){ // forçar baixar (sobrescreve local)
  if(!driveClientId()){toast('Configure o Client ID');return;}
  if(!confirm('Baixar do Drive vai SUBSTITUIR os dados deste aparelho pela versão da nuvem. Continuar?')) return;
  try{ const r=await drivePull(); if(!r){toast('Nenhum backup encontrado no Drive');return;} driveApplyRemote(r); toast('Dados baixados do Drive ✓'); renderAll(); }
  catch(e){toast('Falha: '+e.message);}
}
function driveDisconnect(){ DRIVE.token=null; DRIVE.tokenExp=0; toast('Sessão do Drive encerrada'); renderAll(); }
function saveDriveClientId(){
  const v=(el('drvClient')?el('drvClient').value:'').trim();
  state.settings.driveClientId=v; save(false); toast('Client ID salvo ✓'); renderMore();
}
function toggleDriveAuto(){ state.settings.driveAuto=!state.settings.driveAuto; save(false); renderMore(); if(state.settings.driveAuto && !driveConnected()) driveManualSync(); }

async function driveStartupSync(){
  if(!driveClientId() || !state.settings.driveAuto) return;
  // espera o GIS carregar (até ~5s)
  for(let i=0;i<25 && !gisReady();i++){ await new Promise(r=>setTimeout(r,200)); }
  if(!gisReady()) return;
  try{
    await driveRequestToken(false); // tenta silencioso (só funciona se já autorizado antes)
    const remote=await drivePull();
    if(remote && driveValidRemote(remote)){
      const lu=(state.meta&&state.meta.updatedAt)||0, ru=(remote.meta&&remote.meta.updatedAt)||0;
      if(ru>lu){ driveApplyRemote(remote); renderAll(); }
      else if(lu>ru){ await drivePush(); }
    } else { await drivePush(); }
    if(activeTab==='home') renderHome();
  }catch(e){ /* silencioso: usuário conecta manualmente quando quiser */ }
}

/* ============================================================
   PWA — instalável (manifest + service worker embutidos)
   Funciona quando o app é servido por HTTPS (ou localhost).
   Em file:// o navegador ignora SW/instalação — sem erro.
   ============================================================ */
(function setupPWA(){
  try{
    const icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230e1116'/%3E%3Ctext x='256' y='352' font-size='272' text-anchor='middle' font-family='system-ui'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E";
    const manifest = {
      name:"Meu Bolso — Controle Financeiro", short_name:"Meu Bolso",
      start_url:".", scope:".", display:"standalone",
      background_color:"#0e1116", theme_color:"#0e1116", lang:"pt-BR",
      orientation:"portrait",
      icons:[
        {src:icon, sizes:"192x192", type:"image/svg+xml", purpose:"any maskable"},
        {src:icon, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}
      ]
    };
    const mURL = URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));
    const link=document.createElement('link'); link.rel='manifest'; link.href=mURL;
    document.head.appendChild(link);

    // Service worker: cache do próprio documento p/ abrir offline.
    if('serviceWorker' in navigator && location.protocol.startsWith('http')){
      const swCode = `
        const CACHE='meubolso-v2';
        self.addEventListener('install', e=>{ self.skipWaiting(); });
        self.addEventListener('activate', e=>{ e.waitUntil(self.clients.claim()); });
        self.addEventListener('fetch', e=>{
          const req=e.request;
          if(req.method!=='GET'){ return; }
          // só trata navegação/documento do próprio app (offline-first)
          if(req.mode==='navigate'){
            e.respondWith(
              fetch(req).then(r=>{ const c=r.clone(); caches.open(CACHE).then(ca=>ca.put(req,c)); return r; })
                        .catch(()=>caches.match(req).then(m=>m||caches.match('./')))
            );
          }
        });`;
      const swURL = URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
      navigator.serviceWorker.register(swURL).catch(()=>{ /* silencioso */ });
    }

    // Botão "Instalar app" (aparece só quando o navegador permite)
    let deferredPrompt=null;
    window.addEventListener('beforeinstallprompt', e=>{
      e.preventDefault(); deferredPrompt=e;
      const b=document.createElement('button');
      b.textContent='⬇️ Instalar app';
      b.className='btn primary';
      b.style.cssText='position:fixed;left:12px;right:12px;bottom:calc(72px + var(--safe-b));z-index:60;max-width:536px;margin:0 auto';
      b.onclick=async()=>{ b.remove(); deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; };
      document.body.appendChild(b);
      window.addEventListener('appinstalled',()=>{ b.remove(); }, {once:true});
    });
  }catch(e){ /* PWA opcional: nunca quebra o app */ }
})();
